# ЭТАЛОННОЕ РЕШЕНИЕ (REFERENCE)

name: CI Lab Pipeline

on:
  push:
    branches: [main]
  pull_request:

# Минимально необходимые права: workflow читает код и не делает запись в репозиторий.
permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      # Каждый job изолирован: без checkout файлов репозитория в раннере нет.
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Фиксируем целевую major-версию runtime.
          # Это повышает воспроизводимость и исключает случайные различия окружений.
          node-version: 20
          # Включаем встроенный кеш npm для ускорения повторных прогонов.
          cache: npm
          # Ключ кеша строится по реальному lockfile проекта.
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # npm ci дает детерминированную установку по lockfile.
        run: npm ci

      - name: Run lint
        # Используем существующую команду из package.json.
        run: npm run lint

      - name: Run tests
        # Тесты запускаем из корня репозитория, где доступен package.json.
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Smoke check build output
        # Проверяем реально существующий собранный entrypoint.
        # Этот шаг ловит ошибки контракта сборки до деплоя.
        run: node dist/index.js

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          # Единое имя артефакта, которое затем использует deploy job.
          name: web-dist
          # Путь соответствует фактическому output шага build.
          path: dist/
          # Если артефакт не найден - это ошибка пайплайна, а не warning.
          if-no-files-found: error
          # Ограничиваем срок хранения, чтобы не накапливать "мусор" в Actions.
          retention-days: 7

  deploy:
    name: CD (staging)
    runs-on: ubuntu-latest
    # Деплой допускается только после успешного CI.
    needs: ci
    # Для PR деплой отключен: выкладка идет только при push в main.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
    concurrency:
      # Одновременно выполняется только один staging-деплой.
      group: staging
      cancel-in-progress: true
    steps:
      # Нужен, потому что deploy использует локальный скрипт из репозитория.
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          # Имя должно совпадать с upload в CI job.
          name: web-dist
          path: artifact

      - name: Deploy
        # Передаем корректный путь к скачанному артефакту.
        run: bash scripts/deploy.sh artifact deploy/staging

      - name: Show deployed files
        run: ls -la deploy/staging
